<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Partidos - ISSD</title>
    <!-- Bootstrap 5 CSS -->

    <style>

        .main-container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .table-custom thead { background-color: #212529; color: white; }
    </style>
</head>
<body>

    <div class="container main-container">

            </div>
            
            <div class="col-md-12">
                <div class="table-responsive">
                    <table class="table table-hover table-custom shadow-sm">
                        <thead>
                            <tr>
                                <th>Fecha</th>

                                <th>vs</th>
                                <th>Equipo Visitante</th>
                                <th>Acción</th>

                        </thead>
                        <tbody>
                            <!-- Ejemplo de fila basada en tu base de datos -->
                            <tr>
                                <td>15/05/2026</td>
                                <td><strong>Equipo A</strong></td>
                                <td class="text-muted">vs</td>

                                <td>

                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
