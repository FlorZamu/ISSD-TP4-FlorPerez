<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión - ISSD</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: white;
        }
        .welcome-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        h1 { margin-bottom: 10px; font-size: 2.5rem; }
        p { margin-bottom: 30px; opacity: 0.9; }
        .btn-enter {
            display: inline-block;
            padding: 15px 40px;
            background-color: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: transform 0.3s, background-color 0.3s;
        }
        .btn-enter:hover {
            background-color: #2ecc71;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <h1>TP4: Parcial 1</h1>
        <p>Sistema de Gestión de Partidos de Fútbol</p>
        <!-- Este enlace te redirige al archivo que ya creamos -->
        <a href="Partidos.aspx" class="btn-enter">Ingresar al Sistema</a>
    </div>

</body>
</html>
