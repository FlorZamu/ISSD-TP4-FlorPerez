<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemas ISSD - Proyecto 2025</title>
    <!-- Bootstrap para un diseño ágil -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --azul-institucional: #0d47a1;
            --celeste-fondo: #e3f2fd;
        }
        body {
            background-color: var(--celeste-fondo);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-bienvenida {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: white;
            padding: 40px;
            text-align: center;
            max-width: 500px;
        }
        .btn-acceso {
            background-color: var(--azul-institucional);
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.3s ease;
        }
        .btn-acceso:hover {
            transform: scale(1.05);
            background-color: #1565c0;
        }
        .logo-placeholder {
            font-size: 50px;
            color: var(--azul-institucional);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="card-bienvenida">
        <div class="logo-placeholder">⚽</div>
        <h1 class="fw-bold" style="color: var(--azul-institucional);">Proyecto 2025</h1>
        <p class="text-muted">Gestión de Deportes - Moreno, Buenos Aires</p>
        <hr>
        <p>Bienvenida, <strong>Flor</strong>. Presioná el botón de abajo para acceder al sistema de registro y estadísticas en tiempo real.</p>
        
        <!-- Este enlace es el que te lleva a la parte dinámica de C# -->
        <a href="Partidos.aspx" class="btn btn-primary btn-acceso mt-3">
            Ingresar al Sistema Dinámico
        </a>
        
        <div class="mt-4 small text-secondary">
            Examen Final - Analista de Sistemas
        </div>
    </div>

</body>
</html>
